# ============================================================
# TaskPilot AI Agent - Production Docker Compose
# All services behind Nginx reverse proxy
# ============================================================

services:
  nginx:
    image: nginx:alpine
    container_name: taskpilot-nginx
    ports:
      - "${PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - taskpilot

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_AGENT_URL: ""
    container_name: taskpilot-frontend
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend:5002
      - AGENT_INTERNAL_URL=http://agent-core:8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3002', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - taskpilot

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskpilot-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5002
      - AgentCore__BaseUrl=http://agent-core:8001
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/taskpilot.db
      - Cors__AllowedOrigins__0=http://localhost
      - Cors__AllowedOrigins__1=http://localhost:${PUBLIC_PORT:-80}
    volumes:
      - db-data:/app/data
    depends_on:
      agent-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - taskpilot

  agent-core:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    container_name: taskpilot-agent-core
    environment:
      - DOTNET_API_URL=http://backend:5002
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENAI_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - AGENT_PORT=8001
      - CORS_ORIGINS=http://backend:5002,http://localhost:${PUBLIC_PORT:-80}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - taskpilot

volumes:
  db-data:
    driver: local

networks:
  taskpilot:
    driver: bridge
